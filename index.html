<title>Vanan — Design exploration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin:0; padding:0; background:#f0eee9; font-family:'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  * { box-sizing: border-box; }

  /* Shared prototype tokens — set via CSS variables so Tweaks can swap the palette */
  .v-scope {
    --ink: #0A0A0A;
    --brand: #0B1E3F;
    --brand-2: #0B1E3F;
    --paper: #F7F5F0;
    --warm: #E8E4DA;
    --line: rgba(10,10,10,0.10);
    --mute: rgba(10,10,10,0.55);
    --accent: #0B1E3F;
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .v-serif { font-family: 'Source Serif 4', ui-serif, Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .v-mono  { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }

  /* Subtle document placeholder — no stock photos */
  .v-doc-ph {
    position: relative;
    background:
      repeating-linear-gradient(0deg, transparent 0 22px, rgba(10,10,10,0.06) 22px 23px),
      var(--paper);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .v-doc-ph::after {
    content: attr(data-label);
    position: absolute; left: 12px; bottom: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(10,10,10,0.45);
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  /* Shared small helpers used across artboards */
  .v-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border:1px solid var(--line); border-radius:999px; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color: var(--mute); }
  .v-dot { width:6px; height:6px; border-radius:999px; background: #2E9E6A; }
  .v-hr { height:1px; background: var(--line); border:0; }

  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
</style>

<!-- Tweak defaults (editable by the host) -->
