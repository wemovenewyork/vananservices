<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vanan — Certified Translation & Language Services</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin:0; padding:0; background:#F7F5F0; font-family:'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  * { box-sizing: border-box; }

  .v-scope {
    --ink: #0A0A0A;
    --brand: #0B1E3F;
    --paper: #F7F5F0;
    --warm: #E8E4DA;
    --line: rgba(10,10,10,0.10);
    --mute: rgba(10,10,10,0.55);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .v-serif { font-family: 'Source Serif 4', ui-serif, Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .v-mono  { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }

  .v-doc-ph {
    position: relative;
    background:
      repeating-linear-gradient(0deg, transparent 0 22px, rgba(10,10,10,0.06) 22px 23px),
      var(--paper);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .v-doc-ph::after {
    content: attr(data-label);
    position: absolute; left: 12px; bottom: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(10,10,10,0.45);
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  .v-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border:1px solid var(--line); border-radius:999px; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color: var(--mute); }
  .v-dot { width:6px; height:6px; border-radius:999px; background: #2E9E6A; flex-shrink:0; }
  .v-hr { height:1px; background: var(--line); border:0; margin:0; }

  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  details summary::-webkit-details-marker { display: none; }

  /* ── Scroll reveal ───────────────────────────────────────── */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1),
                transform 0.6s cubic-bezier(0.16,1,0.3,1);
  }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }

  /* ── Button hover ────────────────────────────────────────── */
  .v-btn { transition: transform 0.12s, filter 0.12s !important; }
  .v-btn:hover  { transform: translateY(-1px); filter: brightness(0.88); }
  .v-btn:active { transform: translateY(0px);  filter: brightness(0.78); }

  /* ── Service row hover ───────────────────────────────────── */
  .v-svc-row { transition: background 0.14s, padding-left 0.14s; }
  .v-svc-row:hover { background: rgba(10,10,10,0.03) !important; padding-left: 6px; }
  .v-svc-row:hover .v-svc-arrow { transform: translateX(5px); color: var(--ink) !important; }
  .v-svc-arrow { transition: transform 0.14s, color 0.14s; display: inline-block; }

  /* ── Card hover ──────────────────────────────────────────── */
  .v-card-lift { transition: box-shadow 0.18s, transform 0.18s; }
  .v-card-lift:hover { box-shadow: 0 12px 40px rgba(10,10,10,0.12) !important; transform: translateY(-3px); }

  /* ── Nav link hover ──────────────────────────────────────── */
  .v-nav-link { transition: color 0.14s, opacity 0.14s; }
  .v-nav-link:hover { opacity: 1 !important; color: var(--ink) !important; }

  /* ── Industry / resource card hover ─────────────────────── */
  .v-ind-service:hover { background: rgba(10,10,10,0.025) !important; }
  .v-ind-service { transition: background 0.13s; }

  /* ── Responsive grids (className-based, !important overrides inline) ── */
  .v-g-hero      { display:grid !important; grid-template-columns:1.25fr 1fr;           gap:72px; align-items:start; }
  .v-g-2col      { display:grid !important; grid-template-columns:1fr 1fr;              gap:48px; }
  .v-g-sidebar   { display:grid !important; grid-template-columns:320px 1fr;            gap:72px; }
  .v-g-sidebar-sm{ display:grid !important; grid-template-columns:280px 1fr;            gap:64px; }
  .v-g-3col      { display:grid !important; grid-template-columns:repeat(3,1fr);        gap:48px; }
  .v-g-4col      { display:grid !important; grid-template-columns:repeat(4,1fr);        gap:0;    }
  .v-g-ind-card  { display:grid !important; grid-template-columns:280px 1fr 1fr;        gap:64px; align-items:start; }
  .v-g-5ft       { display:grid !important; grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:40px; }
  .v-g-ent-feat  { display:grid !important; grid-template-columns:280px 1fr;            gap:72px; }

  @media (max-width: 960px) {
    .v-g-hero, .v-g-ind-card, .v-g-ent-feat { grid-template-columns:1fr !important; gap:40px !important; }
    .v-g-sidebar, .v-g-sidebar-sm           { grid-template-columns:1fr !important; gap:40px !important; }
    .v-g-3col   { grid-template-columns:1fr 1fr !important; gap:24px !important; }
    .v-g-4col   { grid-template-columns:1fr 1fr !important; }
    .v-g-5ft    { grid-template-columns:1fr 1fr !important; gap:28px !important; }
    .v-hero-doc { display:none !important; }
  }

  @media (max-width: 600px) {
    .v-g-2col, .v-g-3col, .v-g-4col, .v-g-ind-card { grid-template-columns:1fr !important; gap:20px !important; }
    .v-g-5ft  { grid-template-columns:1fr !important; }
    /* Shrink horizontal section padding */
    .v-scope section, .v-scope header { padding-left:20px !important; padding-right:20px !important; }
    /* Quote: hide sticky sidebar, go single column */
    .v-quote-wrap  { grid-template-columns:1fr !important; }
    .v-quote-aside { display:none !important; }
  }

  /* ── Mobile nav ──────────────────────────────────────────── */
  .v-nav-links-wrap, .v-nav-cta-wrap { display:flex; }
  .v-nav-burger { display:none !important; background:transparent; border:0; cursor:pointer; padding:4px; }

  @media (max-width: 640px) {
    .v-nav-links-wrap, .v-nav-cta-wrap { display:none !important; }
    .v-nav-burger { display:flex !important; }
  }

  .v-mob-nav {
    position:fixed; inset:0; background:var(--paper); z-index:200;
    padding:72px 24px 40px; display:flex; flex-direction:column; gap:4px;
    transform:translateX(100%); transition:transform 0.28s cubic-bezier(0.16,1,0.3,1);
  }
  .v-mob-nav.open { transform:translateX(0); }
  .v-mob-close {
    position:absolute; top:18px; right:20px; background:transparent; border:0;
    cursor:pointer; font-size:26px; color:var(--ink); line-height:1;
  }
  .v-mob-link {
    display:block; padding:16px 0; font-size:22px; color:var(--ink);
    text-decoration:none; border-bottom:1px solid var(--line);
    font-family:'Source Serif 4',serif; font-weight:400; letter-spacing:-0.01em;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="src/shared.jsx"></script>

  <script type="text/babel" src="src/quote.jsx"></script>
  <script type="text/babel" src="src/industries.jsx"></script>
  <script type="text/babel" src="src/resources.jsx"></script>
  <script type="text/babel" src="src/enterprise.jsx"></script>
  <script type="text/babel" src="src/about.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
